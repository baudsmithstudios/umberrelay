<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 96" width="600" height="96">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
      .title-umber {
        fill: #f5a623;
      }
      .title-relay {
        fill: #c8b88a;
      }
      .decoration {
        stroke: #a27f46;
      }
      .rivet {
        fill: #a27f46;
      }
      .glow-text {
        filter: url(#phosphor-glow);
      }
    </style>
    <filter id="phosphor-glow" x="-15%" y="-40%" width="130%" height="180%">
      <!-- outer bloom: wide, soft -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="wide-blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.4" result="amber"/>
      <feComposite in="amber" in2="wide-blur" operator="in" result="outer-glow"/>
      <!-- inner halo: tight, bright -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="tight-blur"/>
      <feFlood flood-color="#ffbe4d" flood-opacity="0.7" result="bright-amber"/>
      <feComposite in="bright-amber" in2="tight-blur" operator="in" result="inner-glow"/>
      <feMerge>
        <feMergeNode in="outer-glow"/>
        <feMergeNode in="inner-glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- panel background -->
  <rect x="0" y="0" width="600" height="96" rx="2" fill="#2a1f0e"/>
  <rect x="1" y="1" width="598" height="94" rx="2" fill="none" stroke="#a27f46" stroke-width="1"/>
  <rect x="4" y="4" width="592" height="88" rx="1" fill="none" stroke="#4a3820" stroke-width="0.5"/>

  <!-- corner rivets -->
  <circle class="rivet" cx="14" cy="14" r="3" opacity="0.7"/>
  <circle class="rivet" cx="586" cy="14" r="3" opacity="0.7"/>
  <circle class="rivet" cx="14" cy="82" r="3" opacity="0.7"/>
  <circle class="rivet" cx="586" cy="82" r="3" opacity="0.7"/>

  <!-- flanking rules with dot terminals -->
  <line class="decoration" x1="32" y1="50" x2="155" y2="50" stroke-width="1"/>
  <circle class="rivet" cx="32" cy="50" r="2" opacity="0.5"/>
  <circle class="rivet" cx="155" cy="50" r="2" opacity="0.5"/>
  <line class="decoration" x1="445" y1="50" x2="568" y2="50" stroke-width="1"/>
  <circle class="rivet" cx="445" cy="50" r="2" opacity="0.5"/>
  <circle class="rivet" cx="568" cy="50" r="2" opacity="0.5"/>

  <!-- title: per-character tspans for uniform spacing with two-tone color -->
  <text
    class="glow-text"
    x="300"
    y="50"
    font-family="'Orbitron', sans-serif"
    font-size="32"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="6"
  ><tspan class="title-umber">U</tspan><tspan class="title-umber">M</tspan><tspan class="title-umber">B</tspan><tspan class="title-umber">E</tspan><tspan class="title-umber">R</tspan><tspan class="title-relay">R</tspan><tspan class="title-relay">E</tspan><tspan class="title-relay">L</tspan><tspan class="title-relay">A</tspan><tspan class="title-relay">Y</tspan></text>
</svg>
