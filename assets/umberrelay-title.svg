<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 96" width="600" height="96">
  <defs>
    <style>
      @font-face {
        font-family: 'Cinzel';
        src: url('data:font/truetype;base64,') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      /* dark mode (default) */
      .title-text { fill: #8678F0; }
      .decoration { stroke: #6B58C5; }
      /* light mode */
      @media (prefers-color-scheme: light) {
        .title-text { fill: #5B4CB0; }
        .decoration { stroke: #7e7895; }
      }
    </style>
  </defs>

  <!-- corner tick marks -->
  <line class="decoration" x1="10" y1="10" x2="26" y2="10" stroke-width="1"/>
  <line class="decoration" x1="10" y1="10" x2="10" y2="26" stroke-width="1"/>
  <line class="decoration" x1="574" y1="10" x2="590" y2="10" stroke-width="1"/>
  <line class="decoration" x1="590" y1="10" x2="590" y2="26" stroke-width="1"/>
  <line class="decoration" x1="10" y1="86" x2="26" y2="86" stroke-width="1"/>
  <line class="decoration" x1="10" y1="70" x2="10" y2="86" stroke-width="1"/>
  <line class="decoration" x1="574" y1="86" x2="590" y2="86" stroke-width="1"/>
  <line class="decoration" x1="590" y1="70" x2="590" y2="86" stroke-width="1"/>

  <!-- flanking rules with end brackets -->
  <line class="decoration" x1="32" y1="48" x2="176" y2="48" stroke-width="1"/>
  <line class="decoration" x1="176" y1="42" x2="176" y2="54" stroke-width="1"/>
  <line class="decoration" x1="424" y1="48" x2="568" y2="48" stroke-width="1"/>
  <line class="decoration" x1="424" y1="42" x2="424" y2="54" stroke-width="1"/>
  <text
    class="title-text"
    x="300"
    y="50"
    font-family="Cinzel, serif"
    font-size="30"
    font-weight="400"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="2"
  >UMBERRELAY</text>
