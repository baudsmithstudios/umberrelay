{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Umberrelay{{if .Title}} — {{.Title}}{{end}}</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/uplot.min.css">
    <script src="/static/js/uplot.min.js" defer></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        nav ul { list-style: none; display: flex; gap: 1rem; padding: 0; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .stat-card { padding: 1rem; }
        .stat-card h3 { margin-bottom: 0.25rem; }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .tracker-pct { color: var(--umberrelay-critical); }
        small:empty { display: none; }
        .value small,
        td small,
        article small {
            display: block;
            color: var(--pico-muted-color);
        }
        .trend-flat { color: var(--pico-muted-color); }
        .tracker-pct .trend-up { color: var(--umberrelay-critical); }
        .tracker-pct .trend-down { color: var(--umberrelay-accent); }
    </style>
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li><strong>Umberrelay</strong></li>
            </ul>
            <ul>
                <li><a href="/"{{if eq .Active "dashboard"}} aria-current="page"{{end}}>Dashboard</a></li>
                <li><a href="/devices"{{if eq .Active "devices"}} aria-current="page"{{end}}>Devices</a></li>
                <li><a href="/domains"{{if eq .Active "domains"}} aria-current="page"{{end}}>Domains</a></li>
                <li><a href="/settings"{{if eq .Active "settings"}} aria-current="page"{{end}}>Settings</a></li>
            </ul>
        </nav>
    </header>
    <main class="container" aria-live="polite">
        {{template "content" .}}
    </main>
    <script src="/static/js/htmx.min.js"></script>
</body>
</html>
{{end}}
