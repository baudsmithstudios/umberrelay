{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Umberrelay{{if .Title}} — {{.Title}}{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/home.css">
    <link rel="stylesheet" href="/static/css/devices.css">
    <link rel="stylesheet" href="/static/css/device_detail.css">
    <link rel="stylesheet" href="/static/css/privacy.css">
    <link rel="stylesheet" href="/static/css/uplot.min.css">
    <script src="/static/js/uplot.min.js" defer></script>
</head>
<body>
    <header class="umberrelay-shell-header">
        <nav class="container umberrelay-topbar">
            <ul>
                <li>
                    <a class="umberrelay-brand" href="/">
                        <span class="umberrelay-brand-umber">Umber</span><span class="umberrelay-brand-relay">relay</span>
                    </a>
                </li>
            </ul>
            <ul>
                <li><a class="umberrelay-toplink" href="/"{{if eq .Active "home"}} aria-current="page"{{end}}>Home</a></li>
                <li><a class="umberrelay-toplink" href="/devices"{{if eq .Active "devices"}} aria-current="page"{{end}}>Devices</a></li>
                <li><a class="umberrelay-toplink" href="/settings"{{if eq .Active "settings"}} aria-current="page"{{end}}>Settings</a></li>
            </ul>
        </nav>
    </header>
    <main class="container" aria-live="polite">
        {{template "content" .}}
    </main>
    <script src="/static/js/htmx.min.js"></script>
</body>
</html>
{{end}}
