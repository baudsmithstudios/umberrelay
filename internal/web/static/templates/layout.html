{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Umberrelay{{if .Title}} — {{.Title}}{{end}}</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/privacy.css">
    <link rel="stylesheet" href="/static/css/uplot.min.css">
    <script src="/static/js/uplot.min.js" defer></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        .tracker-pct { color: var(--umberrelay-critical); }
        nav ul { list-style: none; }
        small:empty { display: none; }
        .value small,
        td small,
        article small {
            display: block;
            color: var(--pico-muted-color);
        }
        .trend-flat { color: var(--pico-muted-color); }
        .tracker-pct .trend-up { color: var(--umberrelay-critical); }
        .tracker-pct .trend-down { color: var(--umberrelay-accent); }
    </style>
</head>
<body>
    <header class="container umberrelay-shell-header">
        <nav class="umberrelay-topbar">
            <ul>
                <li><a class="umberrelay-brand" href="/">Umberrelay</a></li>
            </ul>
            <ul>
                <li><a href="/"{{if eq .Active "privacy"}} aria-current="page"{{end}}>Privacy</a></li>
                <li><a href="/settings"{{if eq .Active "settings"}} aria-current="page"{{end}}>Settings</a></li>
            </ul>
        </nav>
    </header>
    <main class="container" aria-live="polite">
        {{template "content" .}}
    </main>
    <script src="/static/js/htmx.min.js"></script>
</body>
</html>
{{end}}
