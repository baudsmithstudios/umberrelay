{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Umberrelay{{if .Title}} — {{.Title}}{{end}}</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/components.css">
    {{block "page_styles" .}}{{end}}
</head>
<body>
    <nav class="umberrelay-navbar" aria-label="Main navigation">
        <a class="umberrelay-brand" href="/">
            <span class="umberrelay-brand-umber">Umber</span><span class="umberrelay-brand-relay">relay</span>
        </a>
        <ul class="umberrelay-tabs">
            <li><a class="umberrelay-tab" href="/"{{if eq .Active "home"}} aria-current="page"{{end}}>Home</a></li>
            <li><a class="umberrelay-tab" href="/devices"{{if eq .Active "devices"}} aria-current="page"{{end}}>Devices</a></li>
            <li><a class="umberrelay-tab" href="/settings"{{if eq .Active "settings"}} aria-current="page"{{end}}>Settings</a></li>
        </ul>
    </nav>
    <hr class="umberrelay-navbar-rule">
    <main class="container" aria-live="polite">
        {{template "content" .}}
    </main>
    <hr class="umberrelay-footer-rule">
    <div class="umberrelay-footer">Umberrelay 0.1.0 — forwarding DNS with attribution</div>
    <script src="/static/js/htmx.min.js"></script>
    {{block "page_scripts" .}}{{end}}
</body>
</html>
{{end}}
